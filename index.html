<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChitFund Live · Gubbahalli</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#161922;--surface2:#1e2330;--border:#252d40;--accent:#f0c040;--green:#4ecca3;--red:#e05c5c;--blue:#7ba7f7;--purple:#c084fc;--text:#e8eaf0;--muted:#6b7492}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--accent);letter-spacing:-2px}
.splash-sub{color:var(--muted);font-size:12px;margin-top:6px;margin-bottom:28px;text-align:center;line-height:1.7}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:min(360px,92vw)}
.login-box h2{font-family:'Syne',sans-serif;font-size:17px;margin-bottom:20px}
.fi{margin-bottom:13px}
.fi label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;display:block;margin-bottom:5px}
.inp{width:100%;padding:11px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;appearance:none}
.inp:focus{border-color:var(--accent)}.inp option{background:var(--surface2)}
.pin-wrap{position:relative}.pin-wrap .inp{padding-right:42px}
.pin-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;padding:3px}
.btn-login{width:100%;padding:13px;background:var(--accent);color:#0d0f14;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-login:disabled{opacity:.6}
.login-hint{color:var(--muted);font-size:11px;text-align:center;margin-top:10px}
#app{display:none;height:100%;flex-direction:column}
#app.show{display:flex}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hlogo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--accent)}
.hright{display:flex;align-items:center;gap:8px}
.rpill{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.rpill.admin{background:rgba(240,192,64,.15);color:var(--accent);border:1px solid rgba(240,192,64,.3)}
.rpill.viewer{background:rgba(78,204,163,.1);color:var(--green);border:1px solid rgba(78,204,163,.25)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.app-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0}
.bnav-btn{flex:1;padding:7px 2px 6px;background:none;border:none;color:var(--muted);font-size:9px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.bnav-btn .icon{font-size:18px}
.bnav-btn.active{color:var(--accent)}
.panel{display:none;animation:fadeIn .2s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-bottom:4px}
.stat-value{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}
.cv-gold{color:var(--accent)}.cv-green{color:var(--green)}.cv-red{color:var(--red)}.cv-blue{color:var(--blue)}.cv-purple{color:var(--purple)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:9px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px}
.card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
.row span:last-child{color:var(--text);font-family:'DM Mono',monospace}
.pbar{background:var(--border);border-radius:4px;height:4px;overflow:hidden;margin-top:7px}
.pfill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--accent))}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;font-family:'DM Mono',monospace}
.bg{background:rgba(78,204,163,.12);color:var(--green);border:1px solid rgba(78,204,163,.25)}
.br{background:rgba(224,92,92,.12);color:var(--red);border:1px solid rgba(224,92,92,.25)}
.ba{background:rgba(240,192,64,.12);color:var(--accent);border:1px solid rgba(240,192,64,.25)}
.bm{background:rgba(150,150,150,.1);color:var(--muted);border:1px solid rgba(150,150,150,.2)}

.btn{padding:8px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}

.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:26px 22px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .22s ease}

.mfi{margin-bottom:13px}
.mfi label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;display:block;margin-bottom:5px}

.month-header{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.month-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}

.mr{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}

.exp-row{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}

.pending-emi-card{background:rgba(224,92,92,.06);border:1px solid rgba(224,92,92,.2);border-radius:13px;padding:14px;margin-bottom:9px}

.big-stat{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:15px;padding:18px;margin-bottom:11px;text-align:center}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:9px 18px;font-size:13px;z-index:9999;transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(78,204,163,.4);color:var(--green)}
.toast.error{border-color:rgba(224,92,92,.4);color:var(--red)}
#loader{position:fixed;inset:0;background:rgba(13,15,20,.9);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loader.show{display:flex}
.ring{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
// ══════ FIREBASE REST API CONFIG ══════
const FB_PROJECT='chitfund-gubbahalli';
const FB_KEY='AIzaSyCneL3ddi3tdNbt0pDVWP2zOZHH4tEX7EU';
const FB_URL=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

// Firestore REST helpers
async function fsGet(collection,docId){
  const r=await fetch(`${FB_URL}/${collection}/${docId}?key=${FB_KEY}`);
  if(!r.ok)return null;
  const d=await r.json();
  return fsParseDoc(d);
}
async function fsList(collection){
  const r=await fetch(`${FB_URL}/${collection}?key=${FB_KEY}`);
  if(!r.ok)return[];
  const d=await r.json();
  return(d.documents||[]).map(fsParseDoc);
}
async function fsSet(collection,docId,data){
  const body=fsEncodeDoc(data);
  const r=await fetch(`${FB_URL}/${collection}/${docId}?key=${FB_KEY}`,{
    method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
  });
  return r.ok;
}
async function fsAdd(collection,data){
  const body=fsEncodeDoc(data);
  const r=await fetch(`${FB_URL}/${collection}?key=${FB_KEY}`,{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
  });
  return r.ok;
}
async function fsDelete(collection,docId){
  const r=await fetch(`${FB_URL}/${collection}/${docId}?key=${FB_KEY}`,{method:'DELETE'});
  return r.ok;
}
function fsParseDoc(doc){
  if(!doc||!doc.fields)return null;
  const obj={};
  const name=doc.name||'';
  obj._id=name.split('/').pop();
  for(const[k,v]of Object.entries(doc.fields)){obj[k]=fsParseVal(v);}
  return obj;
}
function fsParseVal(v){
  if(v.stringValue!==undefined)return v.stringValue;
  if(v.integerValue!==undefined)return parseInt(v.integerValue);
  if(v.doubleValue!==undefined)return parseFloat(v.doubleValue);
  if(v.booleanValue!==undefined)return v.booleanValue;
  if(v.nullValue!==undefined)return null;
  if(v.arrayValue)return(v.arrayValue.values||[]).map(fsParseVal);
  if(v.mapValue)return Object.fromEntries(Object.entries(v.mapValue.fields||{}).map(([k,val])=>[k,fsParseVal(val)]));
  return null;
}
function fsEncodeDoc(data){
  const fields={};
  for(const[k,v]of Object.entries(data)){
    if(k==='_id')continue;
    fields[k]=fsEncodeVal(v);
  }
  return{fields};
}
function fsEncodeVal(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==='boolean')return{booleanValue:v};
  if(typeof v==='number')return Number.isInteger(v)?{integerValue:v}:{doubleValue:v};
  if(typeof v==='string')return{stringValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.map(fsEncodeVal)}};
  if(typeof v==='object')return{mapValue:{fields:Object.fromEntries(Object.entries(v).map(([k,val])=>[k,fsEncodeVal(val)]))}};
  return{stringValue:String(v)};
}

function getLoanOutstanding(l){
  if(l.type==='onemonth'){if(l.status==='paid')return{principal:0,interest:0,total:0};const i=Math.round(l.amount*(l.omRate||1)/100);return{principal:l.amount,interest:i,total:l.amount+i};}
  if(l.status==='preclosed'||l.status==='closed')return{principal:0,interest:0,total:0};
  if(!l.schedule||!l.schedule.length)return{principal:l.amount,interest:0,total:l.amount};
  const rem=l.schedule.slice(l.paidEMI);
  const rp=rem.reduce((a,r)=>a+r.principal,0),ri=rem.reduce((a,r)=>a+r.interest,0);
  return{principal:rp,interest:ri,total:rp+ri};
}

async function loadAll(){
  try{
    const[loans,expenses,cfg]=await Promise.all([fsList('loans'),fsList('expenses'),fsGet('settings','config')]);
    // Merge with seed schedules
    cachedLoans=(loans&&loans.length>0?loans:[]).map(l=>{
      const seed=SEED_LOANS.find(s=>s.id===l.id);
      if(seed&&(!l.schedule||!l.schedule.length))return{...seed,...l,schedule:seed.schedule};
      return l;
    });
    if(!cachedLoans.length){
      // Seed loans
      await Promise.all(SEED_LOANS.map(l=>fsSet('loans',l.id,l)));
      cachedLoans=[...SEED_LOANS];
    }
    cachedExpenses=expenses||[];
    if(cfg){adminPin=cfg.adminPin||'1234';maxLoanAmount=cfg.maxLoanAmount||300000;monthlyShares=cfg.monthlyShares||{};}
    else{await fsSet('settings','config',{adminPin:'1234',maxLoanAmount:300000,monthlyShares:{}});}
  }catch(e){console.error(e);showToast('Load error: '+e.message,'error');}
}

}

function startSync(){
  syncInterval=setInterval(async()=>{

      const[loans,expenses,cfg]=await Promise.all([fsList('loans'),fsList('expenses'),fsGet('settings','config')]);
      cachedLoans=(loans||[]).map(l=>{const seed=SEED_LOANS.find(s=>s.id===l.id);if(seed&&(!l.schedule||!l.schedule.length))return{...seed,...l,schedule:seed.schedule};return l;});
      cachedExpenses=expenses||[];
      if(cfg){adminPin=cfg.adminPin||adminPin;maxLoanAmount=cfg.maxLoanAmount||maxLoanAmount;monthlyShares=cfg.monthlyShares||monthlyShares;}

}

async function markEMIPaid(loanId){
  if(!isAdmin){showToast('Admin only','error');return}
  const l=cachedLoans.find(x=>x.id===loanId);if(!l)return;
  const updated=l.type==='onemonth'?{...l,status:'paid'}:{...l,paidEMI:l.paidEMI+1};
  await fsSet('loans',loanId,updated);
  const idx=cachedLoans.findIndex(x=>x.id===loanId);
  if(idx>=0)cachedLoans[idx]=updated;
  showToast('Marked paid ✓','success');renderCurrentTab();
}

  editingLoanId=id;
  document.getElementById('loanModalTitle').textContent=id?'Edit Loan':'Add Loan';
  const sel=document.getElementById('lMember');
  sel.innerHTML=ALL_MEMBERS.map(m=>`<option value="${m}">${m}</option>`).join('');
  document.getElementById('lTenure').innerHTML=Array.from({length:60},(_,i)=>`<option value="${i+1}">${i+1} month${i>0?'s':''}</option>`).join('');
  document.getElementById('lType').value='regular';toggleLoanType();
  if(id){
    const l=cachedLoans.find(x=>x.id===id);
    if(l){sel.value=l.member;document.getElementById('lType').value=l.type||'regular';document.getElementById('lAmount').value=l.amount;document.getElementById('lGuarantor').value=l.guarantor||'';document.getElementById('lDisbDate').value=l.disbDate||'';
    if(l.type==='onemonth'){document.getElementById('lOMRate').value=l.omRate||1;document.getElementById('lOMDue').value=l.omDue||'';document.getElementById('lOMStatus').value=l.status||'active';}
    else{document.getElementById('lTenure').value=l.tenure;document.getElementById('lPaid').value=l.paidEMI;document.getElementById('lStatus').value=l.status||'active';
    if(l.status==='preclosed'){document.getElementById('precloseFields').style.display='block';document.getElementById('lPrecloseDate').value=l.precloseDate||'';document.getElementById('lPrecloseAmt').value=l.precloseAmt||'';document.getElementById('lPrecloseWaived').value=l.precloseWaived||0;}
    updateEMICalc();}toggleLoanType();}
  }else{
    if(presetMember)sel.value=presetMember;
    ['lAmount','lGuarantor','lDisbDate','lPrecloseDate','lPrecloseAmt'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('lPaid').value=0;document.getElementById('lPrecloseWaived').value=0;document.getElementById('emiCalc').textContent='—';document.getElementById('lStatus').value='active';document.getElementById('precloseFields').style.display='none';
  }
  document.getElementById('loanModal').classList.add('open');
}
function toggleLoanType(){const t=document.getElementById('lType').value;document.getElementById('regularFields').style.display=t==='regular'?'block':'none';document.getElementById('regularExtra').style.display=t==='regular'?'block':'none';document.getElementById('oneMonthExtra').style.display=t==='onemonth'?'block':'none';}
document.getElementById('lType').addEventListener('change',toggleLoanType);
document.getElementById('lStatus').addEventListener('change',function(){document.getElementById('precloseFields').style.display=this.value==='preclosed'?'block':'none';});
function updateEMICalc(){const a=parseFloat(document.getElementById('lAmount').value)||0,t=parseInt(document.getElementById('lTenure').value)||12;document.getElementById('emiCalc').textContent=a>0?fmt(calcEMI(a,t))+'/mo':'—'}
document.getElementById('lAmount').addEventListener('input',updateEMICalc);
document.getElementById('lTenure').addEventListener('change',updateEMICalc);
document.getElementById('saveLoanBtn').addEventListener('click',async()=>{
  const member=document.getElementById('lMember').value,amount=parseFloat(document.getElementById('lAmount').value);
  const guarantor=document.getElementById('lGuarantor').value,disbDate=document.getElementById('lDisbDate').value;
  const ltype=document.getElementById('lType').value;
  if(!member||!amount||amount<100){showToast('Check inputs','error');return}
  const id=editingLoanId||'l'+Date.now();
  const existing=editingLoanId?cachedLoans.find(l=>l.id===editingLoanId):null;
  let obj;
  if(ltype==='onemonth'){obj={id,member,guarantor,amount,disbDate,type:'onemonth',omRate:parseFloat(document.getElementById('lOMRate').value)||1,omDue:document.getElementById('lOMDue').value,status:document.getElementById('lOMStatus').value};}
  else{const tenure=parseInt(document.getElementById('lTenure').value),paidEMI=parseInt(document.getElementById('lPaid').value)||0,status=document.getElementById('lStatus').value;
  obj={id,member,guarantor,amount,tenure,disbDate,paidEMI,type:'regular',status,schedule:existing?.schedule||[]};
  if(status==='preclosed'){obj.precloseDate=document.getElementById('lPrecloseDate').value;obj.precloseAmt=parseFloat(document.getElementById('lPrecloseAmt').value)||0;obj.precloseWaived=parseFloat(document.getElementById('lPrecloseWaived').value)||0;}}
  await fsSet('loans',id,obj);
  const idx=cachedLoans.findIndex(l=>l.id===id);if(idx>=0)cachedLoans[idx]=obj;else cachedLoans.push(obj);
  showToast('Saved ✓','success');closeModal('loanModal');renderCurrentTab();
});
document.getElementById('closeLoanBtn').addEventListener('click',()=>closeModal('loanModal'));

// ══════ EXPENSE MODAL ══════
function openExpModal(type='expense'){
  expEntryType=type;
  document.getElementById('expModalTitle').textContent=type==='expense'?'Add Expenditure':'Add Other Income';
  document.getElementById('expTypeExpBtn').className='btn btn-sm '+(type==='expense'?'btn-p':'btn-s');
  document.getElementById('expTypeIncBtn').className='btn btn-sm '+(type==='income'?'btn-p':'btn-s');
  document.getElementById('expCatWrap').style.display=type==='expense'?'block':'none';
  document.getElementById('incCatWrap').style.display=type==='income'?'block':'none';
  ['expDate','expDesc','expNote'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('expAmt').value='';
  document.getElementById('expModal').classList.add('open');
}
document.getElementById('expTypeExpBtn').addEventListener('click',()=>openExpModal('expense'));
document.getElementById('expTypeIncBtn').addEventListener('click',()=>openExpModal('income'));
document.getElementById('saveExpBtn').addEventListener('click',async()=>{
  const date=document.getElementById('expDate').value.trim(),desc=document.getElementById('expDesc').value.trim();
  const amount=parseFloat(document.getElementById('expAmt').value),note=document.getElementById('expNote').value.trim();
  const category=expEntryType==='expense'?document.getElementById('expCat').value:document.getElementById('incCat').value;
  if(!date||!desc||!amount||amount<=0){showToast('Fill all fields','error');return}
  const data={date,desc,amount,category,note,entryType:expEntryType};
  await fsAdd('expenses',data);
  cachedExpenses.push({...data,_id:'e'+Date.now()});
  showToast('Saved ✓','success');closeModal('expModal');renderCollections();
});
document.getElementById('closeExpBtn').addEventListener('click',()=>closeModal('expModal'));

// ══════ SETTINGS ══════
function renderSettings(){
  document.getElementById('tab-settings').innerHTML=`<div class="sec-title" style="margin-bottom:14px">⚙️ Settings</div>
  ${isAdmin?`<div class="card" style="margin-bottom:10px">
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:4px">💰 Max Loan Amount</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:9px">Current: <strong style="color:var(--accent)">${fmt(maxLoanAmount)}</strong></div>
    <div style="display:flex;gap:8px"><input type="number" id="mli" class="inp" value="${maxLoanAmount}" style="flex:1"><button class="btn btn-p btn-sm" id="smlb">Save</button></div>
  </div>
  <div class="card" style="margin-bottom:10px">
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:7px">📅 Monthly Share Amounts</div>
    <button class="btn btn-p btn-sm" id="ssb">✏️ Edit Shares</button>
  </div>
  <div class="card" style="margin-bottom:10px">
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:7px">🔐 Admin PIN</div>
    <button class="btn btn-s btn-sm" id="cpb">Change PIN</button>
  </div>`:''}
  <div class="card"><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:7px">ℹ️ App Info</div>
  <div style="font-size:11px;color:var(--muted);line-height:1.9">ChitFund Live v7.1 · Firebase REST<br>14 Members · Real-time sync every 15s<br>Data stored permanently in Firebase<br>Max Loan: ${fmt(maxLoanAmount)}<br>Logged in: <strong style="color:var(--text)">${currentUser}</strong> · ${isAdmin?'<span style="color:var(--accent)">Admin</span>':'View Only'}</div></div>`;
  if(isAdmin){
    document.getElementById('smlb').addEventListener('click',async()=>{const v=parseInt(document.getElementById('mli').value);if(!v||v<1000){showToast('Enter valid amount','error');return}maxLoanAmount=v;await saveConfig();showToast('Updated ✓','success');renderSettings();});
    document.getElementById('ssb').addEventListener('click',openShareModal);
    document.getElementById('cpb').addEventListener('click',()=>document.getElementById('pinModal').classList.add('open'));
  }
}
document.getElementById('savePinBtn').addEventListener('click',async()=>{
  const old=document.getElementById('pinOld').value,nw=document.getElementById('pinNew').value,cf=document.getElementById('pinConf').value;
  if(old!==adminPin){showToast('Wrong PIN','error');return}if(nw.length<4){showToast('Min 4 digits','error');return}if(nw!==cf){showToast('PINs do not match','error');return}
  adminPin=nw;await saveConfig();showToast('PIN updated ✓','success');closeModal('pinModal');
  ['pinOld','pinNew','pinConf'].forEach(i=>document.getElementById(i).value='');
});
document.getElementById('closePinBtn').addEventListener('click',()=>closeModal('pinModal'));
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));
</script>
